server:
  port: 8080

spring:
  application:
    name: smart-energy-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_energy
    username: energy_user
    password: energy_password
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev
  sql:
    init:
      # 🆕 合并 workorder-backend: 改用 ${SQL_INIT_MODE:always} 兼容 prod
      mode: ${SQL_INIT_MODE:always}
      continue-on-error: false
      encoding: UTF-8
  jackson:
    # 🆕 合并 workorder-backend: 保留全局 non_null（具体 DTO 上 @JsonInclude(ALWAYS) 显式保留 null）
    default-property-inclusion: non_null

# MyBatis-Plus（合并 workorder-backend 的 type-aliases-package）
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartenergy.backend.entity,com.smartenergy.workorder.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.smartenergy.backend.controller,com.smartenergy.workorder.controller

logging:
  level:
    com.smartenergy: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN
