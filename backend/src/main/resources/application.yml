server:
  port: 8080

spring:
  application:
    name: smart-energy-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smart_energy}
    username: ${DB_USERNAME:energy_user}
    password: ${DB_PASSWORD:energy_password}
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev
  sql:
    init:
      # SQL 初始化策略：开发/第一次部署用 always，生产可覆写为 never
      mode: ${SQL_INIT_MODE:always}
      continue-on-error: false
      encoding: UTF-8
  jackson:
    # 全局 Jackson 配置：non_null（具体 DTO 上 @JsonInclude(ALWAYS) 显式保留 null）
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

# Epic 6-3: Python 能耗预测微服务
prediction:
  service:
    base-url: http://localhost:8000
    timeout-ms: 8000       # MC Dropout×10 + 并发预热下单次推理可能 >4s，放宽避免超时降级
    lookback: 96          # 取最近 96 条读数作为预测输入窗口

# JWT
jwt:
  secret: ${JWT_SECRET:SmartEnergyMasterSecretKey}
  expiration-ms: 86400000  # 24h

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartenergy.backend.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.smartenergy.backend.controller

logging:
  level:
    com.smartenergy: INFO
    org.springframework.jdbc.core.JdbcTemplate: WARN
