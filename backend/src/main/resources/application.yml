server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_energy
    username: energy_user
    password: energy_password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartenergy.backend.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
