server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_energy
    username: energy_user
    password: energy_password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
      # 生产环境必须配置 password 和 SSL：
      # password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

# Epic 6-3: Python 能耗预测微服务
prediction:
  service:
    base-url: http://localhost:8000
    timeout-ms: 8000       # MC Dropout×10 + 并发预热下单次推理可能 >4s，放宽避免超时降级
    lookback: 96          # 取最近 96 条读数作为预测输入窗口

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smartenergy.backend.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
