services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: smart_energy_db
    environment:
      POSTGRES_USER: energy_user
      POSTGRES_PASSWORD: energy_password
      POSTGRES_DB: smart_energy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_user -d smart_energy"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - energy_network

volumes:
  pgdata:

networks:
  energy_network:
    driver: bridge
