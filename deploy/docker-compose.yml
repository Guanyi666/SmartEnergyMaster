name: smart-energy

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: smart_energy_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-energy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-energy_password}
      POSTGRES_DB: ${DB_NAME:-smart_energy}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-sql/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./init-sql/02_user_expansion.sql:/docker-entrypoint-initdb.d/02_user_expansion.sql:ro
      - ./init-sql/03_audit_log.sql:/docker-entrypoint-initdb.d/03_audit_log.sql:ro
      - ./init-sql/04_llm_analysis.sql:/docker-entrypoint-initdb.d/04_llm_analysis.sql:ro
      - ./init-sql/07_carbon_config.sql:/docker-entrypoint-initdb.d/05_carbon_config.sql:ro
      - ./init-sql/08_notification.sql:/docker-entrypoint-initdb.d/06_notification.sql:ro
      - ./init-sql/seed_sop.sql:/docker-entrypoint-initdb.d/07_seed_sop.sql:ro
      - ./init-sql/seed_cases.sql:/docker-entrypoint-initdb.d/08_seed_cases.sql:ro
      - ./init-sql/09_workorder_audit_fixes.sql:/docker-entrypoint-initdb.d/09_workorder_audit_fixes.sql:ro
      - ./init-sql/10_transfer_requests.sql:/docker-entrypoint-initdb.d/10_transfer_requests.sql:ro
      - ./init-sql/11_db_restructure_v1.sql:/docker-entrypoint-initdb.d/11_db_restructure_v1.sql:ro
      - ./init-sql/12_account_username_format.sql:/docker-entrypoint-initdb.d/12_account_username_format.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-energy_user} -d ${DB_NAME:-smart_energy}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - energy_network

  redis:
    image: redis:7-alpine
    container_name: smart_energy_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - energy_network

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile-backend
    container_name: smart_energy_backend
    environment:
      DB_URL: jdbc:postgresql://timescaledb:5432/${DB_NAME:-smart_energy}
      DB_USERNAME: ${DB_USERNAME:-energy_user}
      DB_PASSWORD: ${DB_PASSWORD:-energy_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PREDICTION_BASE_URL: http://prediction:8000
      JWT_SECRET: ${JWT_SECRET:-SmartEnergyMasterSecretKey}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - energy_network

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile-frontend
    container_name: smart_energy_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - energy_network

  data-pump:
    profiles: ["simulator"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile-data-pump
    container_name: smart_energy_data_pump
    environment:
      SENSOR_API_URL: http://backend:8080/api/sensor/upload
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - energy_network

  prediction:
    profiles: ["ai"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile-prediction
    container_name: smart_energy_prediction
    ports:
      - "${PREDICTION_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - energy_network

volumes:
  pgdata:
  redisdata:

networks:
  energy_network:
    driver: bridge
