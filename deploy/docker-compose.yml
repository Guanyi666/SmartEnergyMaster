services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: smart_energy_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-energy_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-energy_password}
      POSTGRES_DB: smart_energy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-sql/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./init-sql/02_user_expansion.sql:/docker-entrypoint-initdb.d/02_user_expansion.sql:ro
      - ./init-sql/03_audit_log.sql:/docker-entrypoint-initdb.d/03_audit_log.sql:ro
      - ./init-sql/04_llm_analysis.sql:/docker-entrypoint-initdb.d/04_llm_analysis.sql:ro
      - ./init-sql/07_carbon_config.sql:/docker-entrypoint-initdb.d/05_carbon_config.sql:ro
      - ./init-sql/08_notification.sql:/docker-entrypoint-initdb.d/06_notification.sql:ro
      - ./init-sql/seed_sop.sql:/docker-entrypoint-initdb.d/07_seed_sop.sql:ro
      - ./init-sql/seed_cases.sql:/docker-entrypoint-initdb.d/08_seed_cases.sql:ro
      - ./init-sql/09_workorder_audit_fixes.sql:/docker-entrypoint-initdb.d/09_workorder_audit_fixes.sql:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-energy_user} -d smart_energy"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - energy_network

  redis:
    image: redis:7-alpine
    container_name: smart_energy_redis
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - energy_network

volumes:
  pgdata:
  redisdata:

networks:
  energy_network:
    driver: bridge
